name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest
      - run: uv run python -m compileall src tests

  robotframework-compatibility:
    name: Robot Framework ${{ matrix.robotframework-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        robotframework-version: ["7.0.1", "7.1.1", "7.2.2", "7.3.2", "7.4.2"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv pip install "robotframework==${{ matrix.robotframework-version }}"
      - run: uv run python -c "import robot.version; print(robot.version.VERSION)"
      - run: uv run pytest

  package:
    name: Build package artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv build
      - run: python -m venv .venv-package-smoke
      - run: .venv-package-smoke/bin/python -m pip install dist/*.whl
      - run: .venv-package-smoke/bin/robot-lsp --version
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
